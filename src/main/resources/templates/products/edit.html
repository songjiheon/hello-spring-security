<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .detail-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
                <li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/user/password}">비밀번호 변경</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card detail-card p-5">
                <h3 class="fw-bold mb-4">상품 수정</h3>

                <form th:action="@{/products/{id}/edit(id=${productId})}"
                      th:object="${productDto}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">상품명</label>
                        <input type="text" class="form-control"
                               th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">가격</label>
                        <input type="number" class="form-control"
                               th:field="*{price}"
                               th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{price}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">재고</label>
                        <input type="number" class="form-control"
                               th:field="*{stock}"
                               th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{stock}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">설명</label>
                        <textarea class="form-control" rows="4"
                                  th:field="*{description}"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger px-4">수정 완료</button>
                        <a th:href="@{/products}" class="btn btn-outline-secondary">취소</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<footer style="text-align: center;">
    <hr style="border: none; border-top: 1px solid gray;">
    <p style= color:gray th:text="${'학번: 2171106 | 성명: 송지헌 | 실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></p>
</footer>
</html>
